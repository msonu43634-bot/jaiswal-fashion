<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Jaiswal Fashion</title>
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/components.css">
  <style>
    .profile-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 300px 1fr; gap: 30px; }
    @media (max-width: 768px) { .profile-container { grid-template-columns: 1fr; } }
    .profile-sidebar { background: var(--bg-card); border-radius: var(--radius-xl); padding: 24px; box-shadow: var(--shadow-md); border: 1px solid var(--border); height: fit-content; }
    .profile-avatar { width: 80px; height: 80px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--bg-primary); font-size: 32px; font-weight: bold; margin: 0 auto 16px; }
    .profile-name { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 4px; color: var(--text-white); }
    .profile-phone { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
    .profile-menu { list-style: none; padding: 0; margin: 0; }
    .profile-menu li { padding: 12px 16px; border-radius: var(--radius-md); cursor: pointer; font-weight: 500; transition: all 0.3s ease; margin-bottom: 8px; color: var(--text-secondary); }
    .profile-menu li:hover { background: var(--bg-glass); color: var(--gold); }
    .profile-menu li.active { background: rgba(212, 160, 57, 0.1); color: var(--gold); border-left: 3px solid var(--gold); border-radius: 0 var(--radius-md) var(--radius-md) 0;}
    
    .profile-content { background: var(--bg-card); border-radius: var(--radius-xl); padding: 32px; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; animation: fadeIn 0.3s ease; }
    
    .order-card { border: 1px solid var(--border); background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
    .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px; }
    .order-id { font-weight: 600; font-size: 16px; color: var(--text-white); }
    .order-date { color: var(--text-muted); font-size: 14px; }
    .order-status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .status-pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
    .status-confirmed { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
    .status-shipped { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }
    .status-delivered { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
    .status-cancelled { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    
    .order-item { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .order-item-img { width: 50px; height: 50px; border-radius: var(--radius-sm); object-fit: cover; background: var(--bg-glass); }
    .order-item-details { flex: 1; }
    .order-item-title { font-weight: 500; font-size: 14px; color: var(--text-primary); }
    .order-item-meta { font-size: 12px; color: var(--text-muted); }
    .order-total { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--border); font-weight: 700; font-size: 16px; color: var(--text-white); }
    
    /* Order Details View (Flipkart style) */
    .breadcrumb { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; display: flex; gap: 8px; cursor: pointer; }
    .breadcrumb span:hover { color: var(--gold); }
    .od-container { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
    @media(max-width:768px) { .od-container { grid-template-columns: 1fr; } }
    .od-left, .od-right { display: flex; flex-direction: column; gap: 24px; }
    .od-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
    
    .od-product { display: flex; gap: 16px; }
    .od-product img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; background: var(--bg-glass); }
    .od-product-info { flex: 1; }
    .od-product-title { font-size: 16px; color: var(--text-white); margin-bottom: 8px; font-weight: 500; }
    .od-product-seller { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .od-product-price { font-size: 20px; font-weight: 700; color: var(--text-white); }
    
    .od-timeline { margin-top: 30px; position: relative; padding-left: 20px; }
    .od-timeline::before { content:''; position:absolute; left: 5px; top: 10px; bottom: 10px; width: 2px; background: var(--border); }
    .od-step { position: relative; padding-bottom: 30px; }
    .od-step:last-child { padding-bottom: 0; }
    .od-step::before { content:''; position:absolute; left:-20px; top:4px; width:12px; height:12px; border-radius:50%; background:var(--bg-secondary); border:2px solid var(--gold); z-index:1; }
    .od-step.completed::before { background: var(--success); border-color: var(--success); }
    .od-step.completed ~ .od-step::before { border-color: var(--border); }
    .od-step-title { font-weight: 600; color: var(--text-white); font-size: 14px; margin-bottom: 4px; }
    .od-step-date { font-size: 12px; color: var(--text-muted); }
    
    .od-title { font-weight: 600; font-size: 16px; color: var(--text-white); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .od-address p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 4px; }
    .od-address .name { font-weight: 600; color: var(--text-white); margin-bottom: 8px; }
    
    .od-price-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; color: var(--text-secondary); }
    .od-price-total { display: flex; justify-content: space-between; margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--border); font-size: 16px; font-weight: 700; color: var(--text-white); }
    
    .invoice-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text-white); display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; cursor: pointer; transition: all 0.3s; margin-top: 24px; }
    .invoice-btn:hover { background: var(--bg-glass); border-color: var(--gold); color: var(--gold); }
    
    .logout-btn { width: 100%; margin-top: 24px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    .logout-btn:hover { background: rgba(239, 68, 68, 0.2); }
    
    /* Tabs url handling */
    .tab-header-title { color: var(--text-white); margin-bottom: 24px; font-size: 24px; }
    
    /* Manage Addresses UI */
    .add-address-btn { width: 100%; padding: 16px; background: var(--bg-secondary); border: 1px dashed var(--border); border-radius: var(--radius-md); color: var(--gold); font-weight: 600; text-transform: uppercase; cursor: pointer; transition: all 0.3s; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .add-address-btn:hover { background: var(--bg-glass); border-color: var(--gold); }
    .address-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; margin-bottom: 16px; position: relative; }
    .address-badge { background: var(--bg-glass); color: var(--text-secondary); font-size: 10px; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; font-weight: 700; display: inline-block; margin-bottom: 12px; }
    .address-name-phone { font-weight: 600; color: var(--text-white); margin-bottom: 8px; display: flex; gap: 16px; }
    .address-text { color: var(--text-secondary); font-size: 14px; line-height: 1.5; }
    .address-actions { position: absolute; top: 20px; right: 20px; cursor: pointer; color: var(--text-muted); }
    .address-actions:hover { color: var(--gold); }
    
    #addressFormContainer { display: none; background: var(--bg-secondary); border: 1px solid var(--border); padding: 24px; border-radius: var(--radius-md); margin-bottom: 24px; }
    .use-location-btn { background: var(--gold); color: var(--bg-primary); border: none; padding: 10px 16px; border-radius: var(--radius-md); font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 24px; transition: all 0.3s; }
    .use-location-btn:hover { background: var(--gold-dark); transform: translateY(-1px); }
  </style>
</head>
<body>
  <div id="nav-container"></div>

  <main class="page-content">
    <div class="profile-container">
      <aside class="profile-sidebar">
        <div class="profile-avatar" id="userAvatar">U</div>
        <h2 class="profile-name" id="userName">User Name</h2>
        <p class="profile-phone" id="userPhone">+91 XXXXX XXXXX</p>
        
        <ul class="profile-menu">
          <li class="active" onclick="switchTab('orders', this)">My Orders</li>
          <li onclick="switchTab('address', this)">Saved Address</li>
          <li onclick="window.location.href='favorites.html'">Favorites</li>
        </ul>
        
        <button class="btn logout-btn" onclick="logout()">Logout</button>
      </aside>
      
      <section class="profile-content">
        <!-- Orders Tab -->
        <div id="ordersTab" class="tab-pane active">
          <div id="ordersMainView">
            <h2 class="tab-header-title">Order History</h2>
            <div id="ordersList">
              <div class="empty-state">Loading orders...</div>
            </div>
          </div>
          <div id="orderDetailsView" style="display:none;">
            <!-- Rendered via JS -->
          </div>
        </div>
        
        <!-- Address Tab -->
        <div id="addressTab" class="tab-pane">
          <h2 class="tab-header-title">Manage Addresses</h2>
          
          <button class="add-address-btn" id="toggleAddressFormBtn" onclick="toggleAddressForm()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Update Address
          </button>
          
          <div id="addressFormContainer">
            <h3 style="color: var(--gold); margin-bottom: 16px; font-size: 16px;">UPDATE SAVED ADDRESS</h3>
            <form id="addressForm">
              <div style="display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 16px;">
                <div class="form-group" style="margin-bottom:0;">
                  <input type="text" id="profileName" class="form-input" placeholder="Full Name (Required) *" required>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                  <input type="tel" id="profileMobile" class="form-input" placeholder="Phone number (Required) *" maxlength="10" required>
                </div>
              </div>

              <div style="display: grid; grid-template-columns: 1fr auto; gap: 16px; margin-bottom: 16px; align-items: stretch;">
                <div class="form-group" style="margin-bottom:0;">
                  <input type="text" id="profilePincode" class="form-input" placeholder="Pincode (Required) *" maxlength="6" required>
                </div>
                <button type="button" style="background: #2874f0; color: #fff; border: none; border-radius: var(--radius-md); padding: 0 16px; display: flex; align-items: center; gap: 8px; font-weight: 600; cursor: pointer;" onclick="autoDetectLocationForForm()">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                  <span id="locFormText">Use my location</span>
                </button>
              </div>

              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                <div class="form-group" style="margin-bottom:0;">
                  <input type="text" id="profileState" class="form-input" placeholder="State (Required) *" required>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                  <input type="text" id="profileCity" class="form-input" placeholder="City (Required) *" required>
                </div>
              </div>

              <div class="form-group" style="margin-bottom: 16px;">
                <input type="text" id="profileHouse" class="form-input" placeholder="House No., Building Name (Required) *" required>
              </div>
              <div class="form-group" style="margin-bottom: 16px;">
                <input type="text" id="profileRoad" class="form-input" placeholder="Road name, Area, Colony (Required) *" required>
              </div>
              
              <div style="margin-bottom: 24px;">
                <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">Type of address</div>
                <div style="display: flex; gap: 12px;">
                  <label style="display:flex; align-items:center; gap:6px; background:var(--bg-card); border:1px solid var(--border); padding:8px 16px; border-radius:20px; cursor:pointer; color:var(--text-white); font-size: 14px;">
                    <input type="radio" name="addressType" value="Home" checked> 🏠 Home
                  </label>
                  <label style="display:flex; align-items:center; gap:6px; background:var(--bg-card); border:1px solid var(--border); padding:8px 16px; border-radius:20px; cursor:pointer; color:var(--text-white); font-size: 14px;">
                    <input type="radio" name="addressType" value="Work"> 🏢 Work
                  </label>
                </div>
              </div>

              <div style="display: flex; flex-direction: column; gap: 12px;">
                <button type="submit" class="btn btn-primary" id="saveAddressBtn" style="background: #fb641b; color: #fff; font-size: 16px; padding: 14px; font-weight: 600; box-shadow: none; border-radius: 4px; text-transform: uppercase;">Save Address</button>
                <button type="button" class="btn" style="background:transparent; color:var(--text-white); border:none; font-weight:600;" onclick="toggleAddressForm()">Cancel</button>
              </div>
            </form>
          </div>
          
          <div id="savedAddressList">
            <!-- Saved address card will be injected here -->
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js" integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a" crossorigin="anonymous"></script>
  <script src="./js/data.js?v=3"></script>
  <script src="./js/utils.js?v=5"></script>
  <script src="./js/main.js?v=3"></script>
  <script>
    const API_BASE = `/api`;
    const token = localStorage.getItem('jf_customer_token');
    
    if (!token) {
      window.location.href = 'login.html?returnUrl=profile.html';
    }

    initPage('profile');
    
    // Check URL params for active tab
    const urlParams = new URLSearchParams(window.location.search);
    const tabParam = urlParams.get('tab');
    if (tabParam) {
      setTimeout(() => {
        const el = document.querySelector(`.profile-menu li[onclick*="${tabParam}"]`);
        if (el) switchTab(tabParam, el);
      }, 100);
    }
    
    function switchTab(tabId, el) {
      document.querySelectorAll('.profile-menu li').forEach(li => li.classList.remove('active'));
      el.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabId + 'Tab').classList.add('active');
    }

    function logout() {
      localStorage.removeItem('jf_customer_token');
      setUser(null);
      window.location.href = 'index.html';
    }

    async function fetchProfile() {
      try {
        const res = await fetch(`${API_BASE}/customer/profile`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          const user = await res.json();
          document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
          document.getElementById('userName').textContent = user.name;
          document.getElementById('userPhone').textContent = `+91 ${user.phone}`;
          
          document.getElementById('profileName').value = user.name || '';
          document.getElementById('profileMobile').value = user.phone || '';
          
          let house = '', road = '';
          if (user.address) {
            const parts = user.address.split(', ');
            if (parts.length > 1) {
              house = parts[0];
              road = parts.slice(1).join(', ');
            } else {
              road = user.address;
            }
          }
          document.getElementById('profileHouse').value = house;
          document.getElementById('profileRoad').value = road;
          document.getElementById('profileCity').value = user.city || '';
          document.getElementById('profilePincode').value = user.pincode || '';
          // We don't have state saved in DB separately but we can leave it empty or extract from road if we had a standard.
          
          renderSavedAddress(user);
        } else {
          logout();
        }
      } catch (err) {
        showToast('Failed to load profile', 'error');
      }
    }
    
    function toggleAddressForm() {
      const form = document.getElementById('addressFormContainer');
      const btn = document.getElementById('toggleAddressFormBtn');
      if (form.style.display === 'block') {
        form.style.display = 'none';
        btn.style.display = 'flex';
      } else {
        form.style.display = 'block';
        btn.style.display = 'none';
      }
    }
    
    function renderSavedAddress(user) {
      const container = document.getElementById('savedAddressList');
      if (!user.address && !user.city && !user.pincode) {
        container.innerHTML = safeHTML('<div class="empty-state">No address saved yet.</div>');
        return;
      }
      container.innerHTML = safeHTML(`
        <div class="address-card">
          <div class="address-actions" onclick="toggleAddressForm()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          </div>
          <span class="address-badge">HOME</span>
          <div class="address-name-phone">
            <span>${user.name}</span>
            <span>+91 ${user.phone}</span>
          </div>
          <div class="address-text">
            ${user.address ? user.address + ', ' : ''}
            ${user.city ? user.city + ', ' : ''}
            ${user.pincode ? user.pincode : ''}
          </div>
        </div>
      `);
    }
    
    function autoDetectLocationForForm() {
      const btnText = document.getElementById('locFormText');
      
      if (!navigator.geolocation) {
        showToast('Geolocation not supported', 'error');
        return;
      }
      
      btnText.textContent = 'Detecting...';
      
      navigator.geolocation.getCurrentPosition(async (pos) => {
        try {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
          const data = await res.json();
          
          const city = data.city || data.locality || data.principalSubdivision || '';
          const state = data.principalSubdivision || '';
          const pincode = data.postcode || '';
          
          let addressLine = data.locality || '';
          if (addressLine) document.getElementById('profileRoad').value = addressLine;
          if (state) document.getElementById('profileState').value = state;
          if (city) document.getElementById('profileCity').value = city;
          if (pincode) document.getElementById('profilePincode').value = pincode;
          
          document.getElementById('locFormText').textContent = 'Location filled';
          showToast('Location fetched successfully!', 'success');
        } catch (e) {
          btnText.textContent = 'Use my current location';
          showToast('Failed to fetch location data', 'error');
        }
      }, (err) => {
        btnText.textContent = 'Use my current location';
        showToast('Please allow location access', 'warning');
      });
    }

    async function fetchOrders() {
      try {
        const res = await fetch(`${API_BASE}/customer/orders`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          const orders = await res.json();
          const list = document.getElementById('ordersList');
          if (orders.length === 0) {
            list.innerHTML = safeHTML(`<div class="empty-state"><p>You haven't placed any orders yet.</p></div>`);
            return;
          }
          
          list.innerHTML = safeHTML(orders.map(order => `
            <div class="order-card">
              <div class="order-header">
                <div>
                  <div class="order-id">Order #${order.id}</div>
                  <div class="order-date">${new Date(order.created_at).toLocaleString()}</div>
                </div>
                <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
                  <span class="order-status status-${order.status}">${order.status}</span>
                  ${order.awb_code ? `<span style="font-size:11px; color:var(--gold); font-weight:600;">📦 AWB: ${order.awb_code}</span>` : ''}
                  ${order.invoice_path ? `<a href="${order.invoice_path}" target="_blank" style="font-size:11px; color:var(--success); font-weight:600; text-decoration:none;">📄 Invoice</a>` : ''}
                </div>
              </div>
              <div class="order-items">
                ${order.items.map(item => `
                  <div class="order-item">
                    <div class="order-item-details">
                      <div class="order-item-title">${item.product_name}</div>
                      <div class="order-item-meta">Qty: ${item.quantity} | Color: ${item.color || 'N/A'} | Size: ${item.size || 'N/A'}</div>
                    </div>
                    <div style="font-weight: 500">${formatPrice(item.price)}</div>
                  </div>
                `).join('')}
              </div>
              <div class="order-total">
                <div>
                  <span>Total Amount</span>
                  <span class="text-gold" style="margin-left:8px;">${formatPrice(order.total_amount)}</span>
                </div>
                <button class="btn btn-primary" style="padding: 8px 16px; font-size: 14px;" onclick="showOrderDetails(${order.id})">View Details</button>
              </div>
            </div>
          `).join(''));
          window.customerOrders = orders; // Save for detail view
        } else {
          document.getElementById('ordersList').innerHTML = safeHTML('<div class="empty-state"><p>Failed to load orders. Please try again later.</p></div>');
        }
      } catch (err) {
        document.getElementById('ordersList').innerHTML = safeHTML('<div class="empty-state"><p>Failed to connect to server.</p></div>');
      }
    }

    async function showOrderDetails(orderId) {
      const order = window.customerOrders.find(o => o.id === orderId);
      if (!order) return;

      document.getElementById('ordersMainView').style.display = 'none';
      const detailView = document.getElementById('orderDetailsView');
      detailView.style.display = 'block';

      // Show skeleton while loading tracking
      const itemsHtml = order.items.map(item => `
        <a href="product-detail.html?id=${item.product_id}" class="od-product" style="text-decoration:none; display:flex; gap:16px; align-items:center;">
          <div style="width:80px; height:80px; background:var(--bg-card); display:flex; align-items:center; justify-content:center; border-radius:8px; border:1px solid var(--border); overflow:hidden;">
            ${item.image_url ? 
              `<img src="${getImageUrl(item.image_url)}" alt="${item.product_name}" style="width:100%; height:100%; object-fit:cover;">` : 
              `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><path d="M20 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 2 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 20 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>`
            }
          </div>
          <div class="od-product-info">
            <div class="od-product-title" style="transition: color 0.3s;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-white)'">${item.product_name}</div>
            <div class="od-product-seller">Qty: ${item.quantity} | Color: ${item.color || '-'} | Size: ${item.size || '-'}</div>
            <div class="od-product-price">${formatPrice(item.price)}</div>
          </div>
        </a>
      `).join('<hr style="border-color:var(--border); margin:16px 0;">');

      const isShipped = ['shipped', 'delivered', 'completed'].includes(order.status);
      const isDelivered = ['delivered', 'completed'].includes(order.status);
      const isCancelled = order.status === 'cancelled';

      detailView.innerHTML = safeHTML(`
        <div class="breadcrumb" onclick="hideOrderDetails()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
          <span>Back to My Orders</span>
        </div>
        <div class="od-container">
          <div class="od-left">
            <div class="od-card">
              ${itemsHtml}

              <!-- LIVE TRACKING SECTION -->
              <div style="margin-top:28px;">
                <div style="font-weight:700; font-size:15px; color:var(--text-white); margin-bottom:16px; display:flex; align-items:center; gap:8px;">
                  🚚 Shipment Tracking
                  ${order.awb_code ? `<span style="font-size:12px; background:rgba(232,185,74,0.1); color:var(--gold); padding:3px 10px; border-radius:20px; font-weight:600;">AWB: ${order.awb_code}</span>` : ''}
                  ${order.courier_name ? `<span style="font-size:12px; color:var(--text-muted);">${order.courier_name}</span>` : ''}
                </div>
                <div id="trackingTimeline_${order.id}">
                  ${!order.awb_code ? `
                    <div style="padding:16px; background:var(--bg-secondary); border-radius:var(--radius-md); border:1px solid var(--border); color:var(--text-muted); font-size:14px;">
                      ${isCancelled ? '❌ Order cancelled.' : '⏳ Your order is being processed. Tracking will be available once shipped.'}
                    </div>
                  ` : `<div style="color:var(--text-muted); font-size:13px; padding:12px;">⏳ Loading live tracking...</div>`}
                </div>
              </div>
            </div>
          </div>

          <div class="od-right">
            <div class="od-card">
              <div class="od-title">Delivery details</div>
              <div class="od-address">
                <div class="name">${order.customer_name || document.getElementById('userName').textContent}</div>
                <p>${order.customer_address || 'Address not provided'}</p>
                <p>Phone: ${order.customer_phone || document.getElementById('userPhone').textContent}</p>
              </div>
            </div>

            <div class="od-card">
              <div class="od-title">Price details</div>
              <div class="od-price-row"><span>Total MRP</span><span>${formatPrice(order.total_amount)}</span></div>
              <div class="od-price-row"><span>Delivery Charges</span><span style="color:var(--success);">FREE</span></div>
              <div class="od-price-total">
                <span>Total amount</span>
                <span>${formatPrice(order.total_amount)}</span>
              </div>
              <div style="margin-top: 16px; font-size: 14px; color: var(--text-secondary); display:flex; justify-content:space-between;">
                <span>Paid By</span>
                <strong style="text-transform:uppercase; color:var(--text-white);">${order.payment_method || 'COD'}</strong>
              </div>

              ${order.invoice_path
                ? `<a href="${order.invoice_path}" target="_blank" class="invoice-btn" style="display:flex; align-items:center; gap:8px; justify-content:center; text-decoration:none;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download Invoice
                  </a>`
                : `<div style="font-size:13px; color:var(--text-muted); text-align:center; padding:12px 0;">📄 Invoice will be available once the order is processed.</div>`
              }
            </div>
          </div>
        </div>
      `);

      // Load live tracking if AWB exists
      if (order.awb_code) {
        loadLiveTracking(order.id);
      }
    }

    async function loadLiveTracking(orderId) {
      const container = document.getElementById(`trackingTimeline_${orderId}`);
      if (!container) return;

      try {
        const res = await fetch(`${API_BASE}/customer/orders/${orderId}/tracking`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to fetch tracking');
        const data = await res.json();

        const { order: trackOrder, events, live } = data;

        // Build 5-step static timeline
        const steps = [
          { label: 'Order Placed', icon: '📝', done: true },
          { label: 'Confirmed & Processing', icon: '?', done: true },
          { label: 'Shipped', icon: '🚚', done: isShippedStatus(trackOrder.status) },
          { label: 'Out for Delivery', icon: '📬', done: isOutForDelivery(events) || trackOrder.status === 'delivered' },
          { label: 'Delivered', icon: '✅', done: trackOrder.status === 'delivered' },
        ];

        let html = `<div class="od-timeline" style="margin-bottom: 20px;">`;
        steps.forEach((s, i) => {
          html += `
            <div class="od-step ${s.done ? 'completed' : ''}">
              <div class="od-step-title">${s.icon} ${s.label}</div>
              ${s.done && i === 0 ? `<div class="od-step-date">${new Date(window.customerOrders.find(o=>o.id===orderId)?.created_at).toLocaleString('en-IN')}</div>` : ''}
              ${s.done && i === 2 && trackOrder.shipped_at ? `<div class="od-step-date">${new Date(trackOrder.shipped_at).toLocaleString('en-IN')}</div>` : ''}
              ${s.done && i === 4 && trackOrder.delivered_at ? `<div class="od-step-date">${new Date(trackOrder.delivered_at).toLocaleString('en-IN')}</div>` : ''}
            </div>`;
        });
        html += `</div>`;

        // Live current status banner
        if (live) {
          html += `
            <div style="background:rgba(232,185,74,0.08); border:1px solid rgba(232,185,74,0.25); border-radius:var(--radius-md); padding:14px 16px; margin-bottom:16px;">
              <div style="font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px;">Current Status</div>
              <div style="font-weight:700; color:var(--gold); font-size:15px;">${live.current_status || 'In Transit'}</div>
              ${live.current_location ? `<div style="font-size:13px; color:var(--text-secondary); margin-top:4px;">📍 ${live.current_location}</div>` : ''}
              ${trackOrder.estimated_delivery ? `<div style="font-size:13px; color:var(--text-secondary); margin-top:4px;">📍 📅 Expected: ${trackOrder.estimated_delivery}</div>` : ''}
            </div>`;
        }

        // Event history
        if (events && events.length > 0) {
          html += `
            <div style="margin-top:4px;">
              <div style="font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.5px;">Tracking History</div>
              ${events.map(evt => `
                <div style="display:flex; gap:12px; margin-bottom:14px; align-items:flex-start;">
                  <div style="width:8px; height:8px; border-radius:50%; background:var(--gold); margin-top:5px; flex-shrink:0;"></div>
                  <div>
                    <div style="font-size:14px; color:var(--text-white); font-weight:500;">${evt.status || evt.description}</div>
                    ${evt.location ? `<div style="font-size:12px; color:var(--text-muted); margin-top:2px;">📍 ${evt.location}</div>` : ''}
                    ${evt.description && evt.description !== evt.status ? `<div style="font-size:12px; color:var(--text-secondary); margin-top:2px;">${evt.description}</div>` : ''}
                    <div style="font-size:11px; color:var(--text-muted); margin-top:3px;">${new Date(evt.event_time).toLocaleString('en-IN')}</div>
                  </div>
                </div>
              `).join('')}
            </div>`;
        }

        container.innerHTML = safeHTML(html);
      } catch (e) {
        container.innerHTML = safeHTML(`<div style="font-size:13px; color:var(--text-muted); padding:12px;">⚠️ Could not load live tracking. Please try again later.</div>`);
      }
    }

    function isShippedStatus(status) {
      return ['shipped', 'delivered', 'completed'].includes(status);
    }

    function isOutForDelivery(events) {
      return events && events.some(e => (e.status||'').toLowerCase().includes('out for delivery'));
    }

    function hideOrderDetails() {
      document.getElementById('orderDetailsView').style.display = 'none';
      document.getElementById('ordersMainView').style.display = 'block';
    }

    function downloadInvoice(orderId) {
      const order = window.customerOrders.find(o => o.id === orderId);
      if (!order) return;
      
      var itemsRows = '';
      order.items.forEach(function(item) {
        itemsRows += '<tr><td>' + item.product_name + ' <br><small>Color: ' + (item.color || '-') + ' | Size: ' + (item.size || '-') + '<' + '/small><' + '/td>';
        itemsRows += '<td>' + item.quantity + '<' + '/td>';
        itemsRows += '<td class="text-right">' + String.fromCharCode(8377) + item.price.toLocaleString() + '<' + '/td>';
        itemsRows += '<td class="text-right">' + String.fromCharCode(8377) + (item.price * item.quantity).toLocaleString() + '<' + '/td><' + '/tr>';
      });

      var css = 'body{font-family:Segoe UI,Tahoma,sans-serif;padding:40px;color:#333;line-height:1.6}';
      css += '.header{display:flex;justify-content:space-between;border-bottom:2px solid #eee;padding-bottom:20px;margin-bottom:30px}';
      css += '.title{font-size:28px;font-weight:700;color:#111;margin:0}';
      css += '.subtitle{font-size:14px;color:#666}';
      css += 'table{width:100%;border-collapse:collapse;margin-bottom:30px}';
      css += 'th{background:#f9f9f9;text-align:left;padding:12px;border-bottom:2px solid #ddd;font-weight:600}';
      css += 'td{padding:12px;border-bottom:1px solid #eee}';
      css += '.total-row td{font-weight:700;border-top:2px solid #ddd;border-bottom:none}';
      css += '.text-right{text-align:right}';
      css += '.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:40px}';
      css += '.details-box p{margin:4px 0}';

      var rupee = String.fromCharCode(8377);
      var html = [];
      html.push('<!DOCTYPE html><html><head>');
      html.push('<title>Invoice - OD' + order.id + '<' + '/title>');
      html.push('<style>' + css + '<' + '/style>');
      html.push('<' + '/head><body>');
      html.push('<div class="header"><div>');
      html.push('<h1 class="title">INVOICE<' + '/h1>');
      html.push('<div class="subtitle">Order ID: OD' + order.id + '<br>Date: ' + new Date(order.created_at).toLocaleDateString() + '<' + '/div>');
      html.push('<' + '/div><div class="text-right">');
      html.push('<h2 style="margin:0;font-size:20px">JAISWAL FASHION<' + '/h2>');
      html.push('<div class="subtitle">jaiswalfashion.com<br>Support: +91 8877343386<' + '/div>');
      html.push('<' + '/div><' + '/div>');
      html.push('<div class="details-grid">');
      html.push('<div class="details-box"><strong>Billed To:<' + '/strong>');
      html.push('<p>' + (order.customer_name || 'Customer') + '<' + '/p>');
      html.push('<p>' + (order.customer_phone || '') + '<' + '/p><' + '/div>');
      html.push('<div class="details-box"><strong>Shipped To:<' + '/strong>');
      html.push('<p>' + (order.customer_address || 'Address not provided') + '<' + '/p><' + '/div><' + '/div>');
      html.push('<table><thead><tr><th>Product<' + '/th><th>Qty<' + '/th><th class="text-right">Price<' + '/th><th class="text-right">Total<' + '/th><' + '/tr><' + '/thead>');
      html.push('<tbody>' + itemsRows);
      html.push('<tr class="total-row"><td colspan="3" class="text-right">Grand Total<' + '/td>');
      html.push('<td class="text-right">' + rupee + order.total_amount.toLocaleString() + '<' + '/td><' + '/tr>');
      html.push('<' + '/tbody><' + '/table>');
      html.push('<div style="text-align:center;color:#888;font-size:12px;margin-top:50px">This is a computer generated invoice and does not require a signature.<' + '/div>');
      html.push('<' + '/body><' + '/html>');

      var printWindow = window.open('', '_blank');
      printWindow.document.write(html.join(''));
      printWindow.document.close();
      printWindow.onload = function() { printWindow.print(); };
    }

    document.getElementById('addressForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveAddressBtn');
      btn.disabled = true;
      btn.textContent = 'Saving...';
      
      const name = document.getElementById('profileName').value.trim();
      const phone = document.getElementById('profileMobile').value.trim();
      const house = document.getElementById('profileHouse').value.trim();
      const road = document.getElementById('profileRoad').value.trim();
      const address = (house ? house + ', ' : '') + road;
      const city = document.getElementById('profileCity').value.trim();
      const pincode = document.getElementById('profilePincode').value.trim();
      
      const typeEls = document.getElementsByName('addressType');
      let type = 'Home';
      for(let el of typeEls) { if(el.checked) type = el.value; }

      if (!name || !phone || !address || !city || !pincode) {
        showToast('Please fill all required fields', 'error');
        btn.textContent = 'SAVE ADDRESS';
        btn.disabled = false;
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE}/customer/profile`, {
          method: 'PUT',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ name, phone, address, city, pincode, type })
        });
        
        if (res.ok) {
          showToast('Address saved successfully', 'success');
          fetchProfile(); // reload profile data to update saved address card
          toggleAddressForm();
        } else {
          const errorData = await res.json();
          showToast(errorData.error || 'Failed to save address', 'error');
        }
      } catch (err) {
        showToast('Error saving address', 'error');
      } finally {
        btn.textContent = 'SAVE ADDRESS';
        btn.disabled = false;
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      fetchProfile();
      fetchOrders();
    });
  </script>
</body>
</html>
