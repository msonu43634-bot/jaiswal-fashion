<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse premium T-Shirts, Lowers, Jackets, Hoodies, Kurtas & more from Jaiswal Fashion. Filter by category, price, color, and size.">
  <title>Products | Jaiswal Fashion</title>
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/products.css">

</head>
<body>
  <div id="nav-container"></div>

  <!-- Page Hero -->
  <section class="page-hero">
    <div class="container">
      <div class="breadcrumbs">
        <a href="index.html">Home</a>
        <span class="separator">/</span>
        <span class="current">Products</span>
      </div>
      <h1 class="page-hero-title">Our <span class="text-gold">Products</span></h1>
      <p class="page-hero-subtitle">Premium garments crafted at our Madhubani factory</p>
    </div>
  </section>

  <!-- Products Layout -->
  <section class="section products-page">
    <div class="container">
      <div class="products-layout">
        <!-- Sidebar Filters -->
        <aside class="filters-sidebar" id="filtersSidebar">
          <div class="filters-header">
            <h3>Filters</h3>
            <button class="btn btn-ghost btn-sm" id="clearFilters">Clear All</button>
          </div>

          <!-- Search -->
          <div class="filter-group">
            <div class="search-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" class="search-input" id="searchInput" placeholder="Search products...">
            </div>
          </div>

          <!-- Category Filter -->
          <div class="filter-group">
            <h4 class="filter-title">Category</h4>
            <div class="filter-options" id="categoryFilters"></div>
          </div>

          <!-- Price Filter -->
          <div class="filter-group">
            <h4 class="filter-title">Price Range</h4>
            <div class="price-range">
              <input type="range" min="0" max="2500" value="2500" class="price-slider" id="priceSlider">
              <div class="price-labels">
                <span>₹0</span>
                <span id="priceValue">₹2,500</span>
              </div>
            </div>
          </div>

          <!-- Color Filter -->
          <div class="filter-group">
            <h4 class="filter-title">Color</h4>
            <div class="color-filter-grid" id="colorFilters"></div>
          </div>

          <!-- Size Filter -->
          <div class="filter-group">
            <h4 class="filter-title">Size</h4>
            <div class="size-filter-grid" id="sizeFilters"></div>
          </div>
        </aside>

        <!-- Products Content -->
        <div class="products-content">
          <!-- Toolbar -->
          <div class="products-toolbar">
            <div class="toolbar-left">
              <span class="results-count" id="resultsCount">24 Products</span>
              <button class="btn btn-ghost btn-sm mobile-filter-btn" id="mobileFilterBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/></svg>
                Filters
              </button>
            </div>
            <div class="toolbar-right">
              <select class="form-select sort-select" id="sortSelect">
                <option value="popular">Most Popular</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="newest">Newest First</option>
                <option value="rating">Highest Rated</option>
              </select>
              <div class="view-toggle">
                <button class="view-btn active" data-view="grid" id="gridViewBtn">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
                </button>
                <button class="view-btn" data-view="list" id="listViewBtn">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="18" height="4" rx="1"/><rect x="3" y="16" width="18" height="4" rx="1"/></svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Active Filters -->
          <div class="active-filters" id="activeFilters"></div>

          <!-- Products Grid -->
          <div class="products-grid" id="productsGrid"></div>

          <!-- Empty State -->
          <div class="empty-state" id="emptyState" style="display: none;">
            <span class="empty-state-icon">🔍</span>
            <h3 class="empty-state-title">No Products Found</h3>
            <p class="empty-state-text">Try adjusting your filters or search query to find what you're looking for.</p>
            <button class="btn btn-primary" onclick="document.getElementById('clearFilters').click()">Clear All Filters</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Mobile Filter Overlay -->
  <div class="mobile-filter-overlay" id="mobileFilterOverlay"></div>

  <div id="footer-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js" integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a" crossorigin="anonymous"></script>
  <script src="./js/data.js?v=3"></script>
  <script src="./js/utils.js?v=5"></script>
  <script src="./js/main.js?v=3"></script>
  <script>
    // Filter state
    let filters = {
      search: '',
      category: new URLSearchParams(window.location.search).get('category') || '',
      maxPrice: 2500,
      colors: [],
      sizes: [],
      sort: 'popular'
    };

    // Render Category Filters
    function renderCategoryFilters() {
      const categoryFilters = document.getElementById('categoryFilters');
      categoryFilters.innerHTML = `
        <label class="filter-checkbox">
          <input type="radio" name="category" value="" ${!filters.category ? 'checked' : ''}>
          <span class="checkbox-custom"></span>
          <span>All Categories</span>
        </label>
        ${categories.filter(cat => cat.id !== 'buluk').map(cat => `
          <label class="filter-checkbox">
            <input type="radio" name="category" value="${cat.id}" ${filters.category === cat.id ? 'checked' : ''}>
            <span class="checkbox-custom"></span>
            <span>${cat.icon} ${cat.name}</span>
          </label>
        `).join('')}
      `;
    }

    // Render Color Filters
    function renderColorFilters() {
      const colorFilters = document.getElementById('colorFilters');
      const uniqueColors = ['Black', 'White', 'Navy Blue', 'Maroon', 'Olive Green', 'Charcoal', 'Royal Blue', 'Burgundy', 'Mustard', 'Steel Gray'];
      colorFilters.innerHTML = uniqueColors.map(name => {
        const color = colorOptions.find(c => c.name === name);
        return `<button class="color-filter-btn" data-color="${name}" title="${name}" style="background: ${color?.hex || '#333'}"></button>`;
      }).join('');
    }

    // Render Size Filters
    function renderSizeFilters() {
      const sizeFiltersEl = document.getElementById('sizeFilters');
      sizeFiltersEl.innerHTML = sizeOptions.map(size => `
        <button class="size-filter-btn" data-size="${size}">${size}</button>
      `).join('');
    }

    // Filter & Render Products
    function applyFilters() {
      let filtered = products.filter(p => p.category !== 'buluk');

      // Search
      if (filters.search) {
        const q = filters.search.toLowerCase();
        filtered = filtered.filter(p =>
          p.name.toLowerCase().includes(q) ||
          p.category.toLowerCase().includes(q) ||
          (p.description && p.description.toLowerCase().includes(q))
        );
      }

      // Category
      if (filters.category) {
        filtered = filtered.filter(p => p.category === filters.category);
      }

      // Price
      filtered = filtered.filter(p => p.price <= filters.maxPrice);

      // Colors
      if (filters.colors.length) {
        filtered = filtered.filter(p =>
          p.colors && p.colors.some(c => filters.colors.includes(c.name))
        );
      }

      // Sizes
      if (filters.sizes.length) {
        filtered = filtered.filter(p =>
          p.sizes && p.sizes.some(s => filters.sizes.includes(s))
        );
      }

      // Sort
      switch (filters.sort) {
        case 'price-low': filtered.sort((a, b) => a.price - b.price); break;
        case 'price-high': filtered.sort((a, b) => b.price - a.price); break;
        case 'newest': filtered.reverse(); break;
        case 'rating': filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0)); break;
        default: filtered.sort((a, b) => (b.reviewCount || 0) - (a.reviewCount || 0));
      }

      // Render
      const grid = document.getElementById('productsGrid');
      const empty = document.getElementById('emptyState');
      const count = document.getElementById('resultsCount');

      count.textContent = `${filtered.length} Product${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'flex';
      } else {
        grid.style.display = 'grid';
        empty.style.display = 'none';
        grid.innerHTML = filtered.map(p => createProductCard(p)).join('');
        setTimeout(() => initScrollReveal(), 50);
      }

      renderActiveFilters();
    }

    function renderActiveFilters() {
      const container = document.getElementById('activeFilters');
      const tags = [];

      if (filters.category) {
        const cat = categories.find(c => c.id === filters.category);
        tags.push(`<span class="active-filter-tag">${cat?.name || filters.category} <button onclick="removeFilter('category')">?</button></span>`);
      }
      if (filters.maxPrice < 2500) {
        tags.push(`<span class="active-filter-tag">Under ${filters.maxPrice} <button onclick="removeFilter('price')">?</button></span>`);
      }
      filters.colors.forEach(c => {
        tags.push(`<span class="active-filter-tag">${c} <button onclick="removeFilter('color', '${c}')">?</button></span>`);
      });
      filters.sizes.forEach(s => {
        tags.push(`<span class="active-filter-tag">Size ${s} <button onclick="removeFilter('size', '${s}')">?</button></span>`);
      });

      container.innerHTML = tags.join('');
    }

    window.removeFilter = (type, value) => {
      switch (type) {
        case 'category':
          filters.category = '';
          document.querySelector('input[name="category"][value=""]').checked = true;
          break;
        case 'price':
          filters.maxPrice = 2500;
          document.getElementById('priceSlider').value = 2500;
document.getElementById('priceValue').textContent = '₹2,500';
          break;
        case 'color':
          filters.colors = filters.colors.filter(c => c !== value);
          document.querySelector(`.color-filter-btn[data-color="${value}"]`)?.classList.remove('active');
          break;
        case 'size':
          filters.sizes = filters.sizes.filter(s => s !== value);
          document.querySelector(`.size-filter-btn[data-size="${value}"]`)?.classList.remove('active');
          break;
      }
      applyFilters();
    };

    // Event Listeners
    document.getElementById('searchInput').addEventListener('input', debounce(e => {
      filters.search = e.target.value;
      applyFilters();
    }, 300));

    document.getElementById('categoryFilters').addEventListener('change', e => {
      if (e.target.name === 'category') {
        filters.category = e.target.value;
        applyFilters();
      }
    });

    document.getElementById('priceSlider').addEventListener('input', e => {
      filters.maxPrice = parseInt(e.target.value);
      document.getElementById('priceValue').textContent = '' + parseInt(e.target.value).toLocaleString('en-IN');
      applyFilters();
    });

    document.getElementById('colorFilters').addEventListener('click', e => {
      const btn = e.target.closest('.color-filter-btn');
      if (!btn) return;
      const color = btn.dataset.color;
      btn.classList.toggle('active');
      if (filters.colors.includes(color)) {
        filters.colors = filters.colors.filter(c => c !== color);
      } else {
        filters.colors.push(color);
      }
      applyFilters();
    });

    document.getElementById('sizeFilters').addEventListener('click', e => {
      const btn = e.target.closest('.size-filter-btn');
      if (!btn) return;
      const size = btn.dataset.size;
      btn.classList.toggle('active');
      if (filters.sizes.includes(size)) {
        filters.sizes = filters.sizes.filter(s => s !== size);
      } else {
        filters.sizes.push(size);
      }
      applyFilters();
    });

    document.getElementById('sortSelect').addEventListener('change', e => {
      filters.sort = e.target.value;
      applyFilters();
    });

    document.getElementById('clearFilters').addEventListener('click', () => {
      filters = { search: '', category: '', maxPrice: 2500, colors: [], sizes: [], sort: 'popular' };
      document.getElementById('searchInput').value = '';
      document.getElementById('priceSlider').value = 2500;
      document.getElementById('priceValue').textContent = '₹2,500';
      document.getElementById('sortSelect').value = 'popular';
      document.querySelectorAll('.color-filter-btn.active, .size-filter-btn.active').forEach(b => b.classList.remove('active'));
      document.querySelector('input[name="category"][value=""]').checked = true;
      applyFilters();
    });

    // Mobile filter toggle
    document.getElementById('mobileFilterBtn').addEventListener('click', () => {
      document.getElementById('filtersSidebar').classList.toggle('open');
      document.getElementById('mobileFilterOverlay').classList.toggle('active');
    });
    document.getElementById('mobileFilterOverlay').addEventListener('click', () => {
      document.getElementById('filtersSidebar').classList.remove('open');
      document.getElementById('mobileFilterOverlay').classList.remove('active');
    });

    // View toggle
    document.getElementById('gridViewBtn').addEventListener('click', () => {
      document.getElementById('productsGrid').classList.remove('list-view');
      document.getElementById('gridViewBtn').classList.add('active');
      document.getElementById('listViewBtn').classList.remove('active');
    });
    document.getElementById('listViewBtn').addEventListener('click', () => {
      document.getElementById('productsGrid').classList.add('list-view');
      document.getElementById('listViewBtn').classList.add('active');
      document.getElementById('gridViewBtn').classList.remove('active');
    });

    // Initialize page - fetch products from API, then render filters and apply
    initPage('products').then(() => {
      renderCategoryFilters();
      renderColorFilters();
      renderSizeFilters();
      applyFilters();
    });
  </script>
</body>
</html>
